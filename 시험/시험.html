<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance PIP Widget</title>
    <style>
        body {
            background-color: #1e1e1e;
            margin: 0;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }
        select {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444444;
            border-radius: 5px;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        #price {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00e676;

        }
    </style>
</head>
<body>

    <select id="symbol" onchange="changeSymbol()">
        <option value="BTCUSDT">BTC / USDT</option>
        <option value="ETHUSDT">ETH / USDT</option>
        <option value="ADAUSDT">ADA / USDT</option>
        <option value="XRPUSDT">XRP / USDT</option>
    </select>
    
    <div id="price">Loading...</div>

    <script>
        let ws = null;

        function connectWebSocket(symbol) {
            if (ws) ws.close();

            const priceEl = document.getElementById('price');
            priceEl.innerText = "Loading...";
            priceEl.style.color = "#aaaaaa";

            // 스마트폰 브라우저가 바이낸스 서버와 직접 다이렉트로 통신합니다!
            ws = new WebSocket('wss://stream.binance.com:9443/ws/' + symbol.toLowerCase() + '@trade');

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.p) {
                    let price = parseFloat(data.p);
                    let formattedPrice = price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 8 });
                    priceEl.innerText = formattedPrice.replace(/\.?0+$/, '');
                    priceEl.style.color = "#ffffff";
                }
            };

            ws.onerror = function(error) {
                priceEl.innerText = "Error!";
                priceEl.style.color = "#ff4444";
            };
        }

        function changeSymbol() {
            connectWebSocket(document.getElementById('symbol').value);
        }

        window.onload = function() {
            connectWebSocket('BTCUSDT');
        };
    </script>
</body>
</html>
